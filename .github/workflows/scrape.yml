name: Scrape Housing.com Price Trends

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (Stage 0 + Stage 2, DB only)
        run: python run_pipeline.py --delay 1.5
