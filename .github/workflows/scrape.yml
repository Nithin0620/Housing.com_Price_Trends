name: Scrape Housing.com Price Trends

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (DB only)
        run: python main.py --db --no-csv --delay 0.5
